# mapping_models/joshi_2026_qubit1.yaml
#
# Joshi 2026 Qubit 1 — validation case for frequency scaling test.
# Same film as Qubit 2 (tan_delta=1.6e-3, Tc=0.7K, RRR=1.02).
# Lower frequency than Qubit 2 — model should predict similar or slightly
# higher T1 (T1_pad_TLS ∝ 1/f, so lower f → longer T1_pad_TLS).
# OCS transmon (EJ/EC=16) — charge noise contributes to T2 but not T1.
#
# Source: Joshi et al., arXiv:2603.13174 (2026)
#   Table S2 (qubit parameters), Table S3 (coherence data)

sample_id: "Joshi_2026_Q1"
material: "Ta"
film_phase: "beta-Ta"
substrate: "sapphire"
notes: >
  Same film as Qubit 2 (Films F15/F16, ~260nm beta-Ta on c-plane sapphire).
  OCS transmon regime (EJ/EC=16) — T2 affected by charge noise.
  Frequency slightly lower than Qubit 2 → slightly longer T1_pad_TLS expected.

