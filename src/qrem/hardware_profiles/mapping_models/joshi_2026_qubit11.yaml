# mapping_models/joshi_2026_qubit11.yaml
#
# Joshi 2026 Qubit 11 — validation case for highest frequency / lowest T1.
# Same film as Qubit 2 (tan_delta=1.6e-3, Tc=0.7K, RRR=1.02).
# Non-OCS transmon (EJ/EC=122) — deepest transmon regime.
# f=5.804 GHz — about 2.1x higher than Qubit 2.
# T1=40us is the lowest across all 11 qubits — paper notes frequency-dependent Q.
# This is the strongest test of frequency scaling in the model.
#
# Source: Joshi et al., arXiv:2603.13174 (2026)
#   Table S2 (qubit parameters), Table S3 (coherence data)

sample_id: "Joshi_2026_Q11"
material: "Ta"
film_phase: "beta-Ta"
substrate: "sapphire"
notes: >
  Same film as Qubit 2 (Films F15/F16, ~260nm beta-Ta on c-plane sapphire).
  Highest frequency and lowest Q of all 11 qubits.
  Paper notes: "qubit with highest frequency of 5.80 GHz has lowest Q of
  (1.5±0.2)×10^6, suggesting frequency-dependent qubit quality factor."
  Purcell effect ruled out (on-chip Purcell filter, T1_Purcell > 5ms).
  Possible cause: radiative coupling to spurious package modes.
  Non-OCS (EJ/EC=122) — T2_E < T1 suggests additional dephasing despite
  being deep in transmon regime.

measured:
  T1_us:
    value: 40.0
    provenance: MEASURED
    notes: "Time-averaged T1 over 768 measurements. Table S3."
  T2_us:
    value: 78.0
    provenance: MEASURED
    measurement_method: echo
    notes: "Time-averaged T2_E. Table S3."

