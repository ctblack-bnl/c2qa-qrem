  date_generated: 2026-05-23
  derived_material: Al
  n_samples_total: 16
  min_samples_threshold: 3
  general_defaults_source: transmon_general_defaults.yaml
  corpus_composition:
    tan_delta_effective_surface: "9 x tan_delta_effective_surface"
    Qi: "1 x Qi_internal"
