# hardware_profiles/material_defaults/Al_material_defaults.yaml
# Generated by compute_class_defaults.py
# Generated: 2026-05-23
#
# Material-specific T1 decomposition defaults for: Al
# Based on 16 samples in records.db
#
# [CORPUS AVERAGE] fields: computed from corpus — improve as more papers are ingested.
# [CLASS DEFAULT]  fields: carried from transmon_general_defaults.yaml unchanged.
#   These are geometry/system parameters not derivable from material measurements.
#
# Used by t1_decomposition.py when a Al sample is missing a field.
# Regenerate by running: python3 compute_class_defaults.py

model_type: transmon_analytical
description: "T1 decomposition defaults — Al, corpus average (2026-05-23)"
material: Al
substrate: mixed
notes: >
  Per-material defaults for Al. Corpus-averaged fields use mean across
  16 samples grouped by derived_material = "Al" in records.db.
  Non-material fields (geometry, junction, QP floor, radiation) are carried
  from transmon_general_defaults.yaml unchanged.

# =============================================================================
# SURFACE PARTICIPATION RATIOS — geometry-dependent, not material averages
# =============================================================================
surface_participation:
  p_MS_resonator:
    value: 8.630e-04
    provenance: CLASS_DEFAULT
    notes: >
      Mid-range CPW resonator surface participation ratio (s=6µm geometry). Joshi 2026 Table S4. Highly geometry-dependent — narrow gap (s=2µm) gives ~2.2e-3; large LE resonators give ~8e-5. If the specific resonator geometry is known, use the appropriate value from Table S4 or FEM simulation.
  p_MS_pad:
    value: 1.300e-04
    provenance: CLASS_DEFAULT
    notes: >
      Qubit capacitor pad surface participation ratio. Joshi 2026 main text: "qubits are designed with a p_MS of 1.3e-4". This is the primary geometric input for translating tan_delta to qubit T1_pad_TLS. Geometry-dependent — FEM simulation needed for a specific device layout. The Joshi value is a good class default for modern optimized 2D transmons. Previous default was 5e-3 (resonator geometry, incorrect for qubit pads).

# =============================================================================
# JUNCTION TLS — Al/AlOx tunnel barrier, not material-dependent
# =============================================================================
junction_tls:
  p_junction_surface:
    value: 2.900e-05
    provenance: CLASS_DEFAULT
    notes: "Junction surface participation ratio. Derived from Joshi 2026 calibration: gives T1_junction_TLS ~ 1000 µs at f=2.736 GHz with tan_delta_junction=2e-3. Not directly measured — inferred from overall model calibration. FEM simulation of the specific junction geometry needed for accuracy."
  tan_delta_junction:
    value: 2.000e-03
    provenance: CLASS_DEFAULT
    notes: "Effective Al/AlOx junction loss tangent. Typical Al/AlOx value from literature (Martinis & Geller 2014; Carroll et al. 2022). Range: 1e-3 to 5e-3 depending on oxidation conditions and junction quality. This is the dominant TLS source in the junction — the tunnel barrier itself, not the metal-air or metal-substrate interfaces."

# =============================================================================
# EFFECTIVE SURFACE LOSS TANGENT — corpus average for Al
# =============================================================================
tan_delta_effective_surface:
  value: 2.646e-03
  provenance: "CORPUS_AVERAGE — Al, N=9"
  material: Al
  notes: >
    Mean 2.646e-03 ± 1.250e-03 across 9 Al samples (9 x tan_delta_effective_surface)

# =============================================================================
# INTERFACE LOSS TANGENTS — geometry/substrate specific, CLASS_DEFAULT
# =============================================================================
interface_loss_tangents:
  tan_delta_MS:
    value: 1.000e-03
    provenance: CLASS_DEFAULT
    notes: "Metal-substrate interface. Literature estimate — direct independent measurement is rare because p_MS and p_MA are correlated in typical resonator geometries. Read et al. 2023."
  tan_delta_SA:
    value: 1.500e-03
    provenance: CLASS_DEFAULT
    notes: "Substrate-air interface, sapphire (EFG). Read et al. 2023 Table II."
  tan_delta_MA:
    value: 0.033
    provenance: CLASS_DEFAULT
    notes: "Metal-air interface (aluminum oxide native oxide). Read et al. 2023 Table VII. For beta-Ta, oxide thickness is ~2.9nm (vs ~2.45nm for alpha-Ta) — slightly higher MA loss expected (Joshi 2026 Section S9)."
  tan_delta_bulk:
    value: 6.300e-08
    provenance: CLASS_DEFAULT
    notes: "Bulk substrate dielectric loss, sapphire (EFG). Read et al. 2023 Table II. For HEMEX sapphire use < 19e-9. For silicon use separate silicon defaults. No bulk TLS contribution was detected in Joshi 2026 across the full p_MS range studied — consistent with this value being negligible."

# =============================================================================
# QUASIPARTICLE — Tc_K_pad_fallback corpus average for Al; rest CLASS_DEFAULT
# =============================================================================
quasiparticle:
  T_operating_mK:
    value: 20
    provenance: CLASS_DEFAULT
    notes: "Standard dilution refrigerator base temperature."
  Tc_K_junction:
    value: 1.2
    provenance: CLASS_DEFAULT
    notes: "Al junction Tc. Used for junction QP channel — junctions are Al/AlOx/Al in virtually all corpus devices regardless of pad material (Ta, Nb, Re etc.). Even at Tc=1.2K, thermal QP at 20mK is negligible (activation exponent ~30). Non-equilibrium QP from stray radiation dominates in practice (Joshi 2026)."
  Tc_K_pad_fallback:
    value: 1.14
    provenance: "CORPUS_AVERAGE — Al, N=9"
    notes: >
      Mean 1.14 ± 0.156 across 9 Al samples
  T1_QP_nonequilibrium_us:
    value: 1e+03
    provenance: CLASS_DEFAULT
    notes: >
      Non-equilibrium QP T1 floor — system/packaging dependent, not material. Joshi 2026: observed QP fractions 1e-9 to 1e-5 from stray radiation. This default represents a reasonably well-shielded system. Poor shielding can reduce this to ~100µs; careful radiation shielding can push > 10ms. Output labeled ASSUMED — not derivable from corpus material measurements.

# =============================================================================
# VORTEX — mean_free_path corpus average for Al; T1 defaults CLASS_DEFAULT
# =============================================================================
vortex:
  mean_free_path_nm:
    value: null
    provenance: "CLASS_DEFAULT"
    notes: >
      Insufficient corpus data (N=0 < 3) — from transmon_general_defaults.yaml. Interface loss tangents in this file are sapphire-specific (EFG and HEMEX grades). Silicon defaults differ — update when silicon corpus grows sufficiently. For beta-Ta on sapphire, use tan_delta_effective_surface from Joshi 2026 directly if available in the material record (preferred over per-interface decomposition).
  coherence_length_nm:
    value: 100
    provenance: CLASS_DEFAULT
    notes: >
      BCS coherence length for Al dirty limit. Ta~93nm, Nb~38nm, Al~1600nm dirty. Used to determine clean vs dirty limit when mean_free_path not reported. For beta-Ta: deep dirty limit confirmed (l < 1nm << xi_0), Joshi 2026 S7.
  T1_vortex_us_default_clean:
    value: 500
    provenance: CLASS_DEFAULT
    notes: >
      Fallback T1_vortex for clean-limit films (l > xi). Vortex motion is the primary loss channel in clean-limit films. Corpus finding (May 2026): dirty-limit Ta-Hf films show ~10x higher vortex activation temperature than clean-limit films.
  T1_vortex_us_default_dirty:
    value: 1e+09
    provenance: CLASS_DEFAULT
    notes: >
      Fallback T1_vortex for dirty-limit films (l < xi). Vortex motion is suppressed in the dirty limit — effectively not a loss channel. Set to 1e9 µs (negligible) for dirty-limit films including beta-Ta (Joshi 2026: l < 1nm, deep dirty limit) and most high-resistivity films.
  T1_vortex_us_default_unknown:
    value: 1e+09
    provenance: CLASS_DEFAULT
    notes: >
      Fallback when clean/dirty limit cannot be determined from mean free path. Set to 1e9 µs (negligible) because: (1) vortex motion is not identified as a significant loss channel in current state-of-art qubit literature (Joshi 2026 does not mention vortex loss); (2) most corpus materials are in or near the dirty limit where vortex motion is suppressed. If mean_free_path_nm is reported and indicates clean limit, the clean default (500 µs) applies instead.

# =============================================================================
# RADIATION — system/packaging parameter, not material. Always CLASS_DEFAULT.
# =============================================================================
radiation:
  T1_radiation_us:
    value: 5e+03
    provenance: CLASS_DEFAULT
    notes: >
      Radiation + Purcell loss — engineering/packaging parameter, not material. 5ms consistent with well-packaged 2D transmon with on-chip Purcell filter (Joshi 2026: simulated T1_Purcell > 5ms; Bland 2025: similar result). 3D cavity geometries achieve much longer values (ms to seconds). Output labeled ASSUMED — not derivable from corpus material measurements.

# =============================================================================
# PROVENANCE
# =============================================================================
corpus_provenance:
